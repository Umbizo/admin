name: GitHub Backup to S3

on:
  schedule:
    - cron: "0 3 * * *"  # daily at 03:00 UTC
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq zip git curl

      - name: Configure AWS with IAM Role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::651706770807:role/GithubBackup:aws:iam::651706770807:role/GithubBackup
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Backup all repos to S3
        env:
          GH_TOKEN: ${{ secrets.PAT1 }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          set -e

          mkdir repos
          cd repos

          echo "Fetching list of repos..."
          # List all repos for the user/org
          curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/user/repos?per_page=200" \
            | jq -r '.[].clone_url' \
            | while read repo; do
                name=$(basename "$repo" .git)
                echo "Backing up $name..."

                # Clone bare mirror
                git clone --mirror "$repo"

                # Zip and upload
                zip -r "$name.zip" "$name.git"
                aws s3 cp "$name.zip" \
                  "s3://$S3_BUCKET/$(date +%F)/$name.zip"

                # Cleanup
                rm -rf "$name.git" "$name.zip"
              done
